<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reality Check</title>
    <meta name="description" content="Reality Check legal, privacy, and support pages." />
    <style>
      :root {
        color-scheme: dark;
        --bg: #120d17;
        --panel: #1d1624;
        --text: #fff7fb;
        --muted: #a99caf;
        --line: #372c40;
        --shock: #ff2d6b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.55;
      }
      main {
        width: min(760px, calc(100% - 32px));
        margin: 0 auto;
        padding: 64px 0;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(40px, 8vw, 72px);
        line-height: 0.95;
        letter-spacing: 0;
        text-transform: uppercase;
      }
      p { color: var(--muted); font-size: 18px; }
      nav {
        display: grid;
        gap: 12px;
        margin-top: 32px;
      }
      a {
        display: block;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--text);
        padding: 18px 20px;
        text-decoration: none;
        font-weight: 700;
      }
      a:focus, a:hover { border-color: var(--shock); }
      small { color: var(--muted); }
    </style>
  </head>
  <body>
    <main>
      <h1>Reality Check</h1>
      <p>Legal, privacy, and support pages for the Reality Check iOS app.</p>
      <nav aria-label="Legal pages">
        <a href="./legal/privacy/">Privacy Policy</a>
        <a href="./legal/terms/">Terms of Service</a>
        <a href="./legal/support/">Support</a>
      </nav>
      <p><small>Last updated: June 17, 2026</small></p>
    </main>
  </body>
</html>
